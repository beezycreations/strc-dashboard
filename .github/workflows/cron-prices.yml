name: Fetch live prices

on:
  schedule:
    # Every 5 minutes during extended market hours (Mon-Fri, 8am-8pm ET = 13:00-01:00 UTC)
    - cron: '*/5 13-23 * * 1-5'
    - cron: '*/5 0-1 * * 2-6'
    # BTC trades 24/7 — fetch every 15 min on weekends
    - cron: '*/15 * * * 0,6'
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch STRC, MSTR, BTC, and peer prices
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing SITE_URL or CRON_SECRET secrets — skipping"
            exit 0
          fi

          RESULT=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/prices")

          API_CODE=$(echo "$RESULT" | tail -1)
          API_BODY=$(echo "$RESULT" | sed '$d')

          echo "prices response ($API_CODE): $API_BODY"

          if [ "$API_CODE" != "200" ]; then
            echo "::warning::Prices cron returned $API_CODE"
          fi
