name: Calibrate ATM participation rates

on:
  schedule:
    # Once daily after market close (5 PM ET = 22:00 UTC)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  calibrate-atm:
    runs-on: ubuntu-latest
    steps:
      - name: Recalibrate ATM participation rates from confirmed 8-K data
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing SITE_URL or CRON_SECRET secrets — skipping"
            exit 0
          fi

          RESULT=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/atm-calibration")

          API_CODE=$(echo "$RESULT" | tail -1)
          API_BODY=$(echo "$RESULT" | sed '$d')

          echo "atm-calibration response ($API_CODE): $API_BODY"

          if [ "$API_CODE" != "200" ]; then
            echo "::warning::ATM calibration cron returned $API_CODE"
          fi
